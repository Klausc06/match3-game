types:
  Project:
    required:
    - name
    - tech_stack
    status_enum:
    - planning
    - active
    - paused
    - complete
    - archived
  GameModule:
    required:
    - name
    - layer
    - file
    layer_enum:
    - core
    - config
    - elements
    - powerups
    - ui
  Bug:
    required:
    - title
    - priority
    - status
    priority_enum:
    - P0
    - P1
    - P2
    - P3
    - P4
    status_enum:
    - open
    - in_progress
    - fixed
    - wontfix
    - deferred
  Feature:
    required:
    - title
    - status
    status_enum:
    - proposed
    - planned
    - in_progress
    - complete
    - deferred
  Theme:
    required:
    - name
    - slug
  Person:
    required:
    - name
    - role
  Phase:
    required:
    - number
    - description
    - status
    status_enum:
    - complete
    - in_progress
    - planned
relations:
  has_module:
    from_types:
    - Project
    - Phase
    to_types:
    - GameModule
    cardinality: one_to_many
  has_bug:
    from_types:
    - GameModule
    - Project
    to_types:
    - Bug
    cardinality: one_to_many
  has_feature:
    from_types:
    - Project
    to_types:
    - Feature
    cardinality: one_to_many
  owns:
    from_types:
    - Person
    to_types:
    - Project
    cardinality: many_to_one
  has_theme:
    from_types:
    - Project
    to_types:
    - Theme
    cardinality: one_to_many
  has_phase:
    from_types:
    - Project
    to_types:
    - Phase
    cardinality: one_to_many
  blocks:
    from_types:
    - Bug
    to_types:
    - Feature
    cardinality: many_to_many
    acyclic: true
  depends_on:
    from_types:
    - Feature
    to_types:
    - Feature
    cardinality: many_to_many
    acyclic: true
